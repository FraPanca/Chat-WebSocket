<!DOCTYPE html>
<html>
<head>

</head>
<body>

	<div class="container">
		<div id="accesso">
			<form id="myForm" onSubmit="return false;">

			</form>
		</div>
		<div id="chat" style="display: none">
			<div id="messaggi"></div>
			<input type="text" name="msg" id="msg" placeholder="..." />

		</div>
	</div>

</body>
</html>
